<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Event Flyer</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 600px; margin: 2em auto; padding: 1em; }
  h1 { color: #2c3e50; }
  dl { display: grid; grid-template-columns: auto 1fr; gap: 0.3em 1em; }
  dt { font-weight: bold; }
</style>
</head>
<body>
<h1 data-testid="title">Haymarket Tap — Event Flyer</h1>
<dl>
  <dt>Venue</dt><dd data-testid="venue_name">Haymarket Tap</dd>
  <dt>Address</dt><dd data-testid="venue_address">12 Dalry Rd, Edinburgh EH11 2BG</dd>
  <dt>Date</dt><dd data-testid="date">2026-04-25</dd>
  <dt>Time</dt><dd data-testid="time">19:30</dd>
  <dt>Party size</dt><dd data-testid="party_size">6</dd>
  <dt>Weather</dt><dd data-testid="condition">cloudy</dd>
  <dt>Temperature</dt><dd data-testid="temperature">12°C</dd>
  <dt>Total cost</dt><dd data-testid="total">&pound;556</dd>
  <dt>Deposit required</dt><dd data-testid="deposit">&pound;111</dd>
</dl>
</body>
</html>
