<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Event Flyer</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 600px; margin: 2em auto; padding: 1em; }
  h1 { color: #2c3e50; }
  dl { display: grid; grid-template-columns: auto 1fr; gap: 0.3em 1em; }
  dt { font-weight: bold; }
</style>
</head>
<body>
<h1 data-testid="title">The Royal Edinburgh — Event Flyer</h1>
<dl>
  <dt>Venue</dt><dd data-testid="venue_name">The Royal Edinburgh</dd>
  <dt>Address</dt><dd data-testid="venue_address">1 Castle Road, Edinburgh</dd>
  <dt>Date</dt><dd data-testid="date">2023-04-20</dd>
  <dt>Time</dt><dd data-testid="time">7:00 PM</dd>
  <dt>Party size</dt><dd data-testid="party_size">8</dd>
  <dt>Weather</dt><dd data-testid="condition">Sunny</dd>
  <dt>Temperature</dt><dd data-testid="temperature">18°C</dd>
  <dt>Total cost</dt><dd data-testid="total">&pound;250</dd>
  <dt>Deposit required</dt><dd data-testid="deposit">&pound;50</dd>
</dl>
</body>
</html>
