flows:
  # ─────────────────────────────────────────────────────────────────
  # confirm_booking — the ONE flow this homework uses.
  #
  # Entry: programmatic. RasaStructuredHalf POSTs:
  #   {"sender": "...", "message": "/confirm_booking",
  #    "metadata": {"booking": {"venue_id": ..., "party_size": 6, ...}}}
  #
  # Rasa's CompactLLMCommandGenerator parses "/confirm_booking" and
  # emits a StartFlow(confirm_booking) command. The flow then runs
  # ActionValidateBooking, which:
  #   1. reads tracker.latest_message.metadata.booking (our booking data)
  #   2. sets each slot
  #   3. validates against rules (party_size <= 8, deposit <= £300)
  #   4. sets validation_error slot (either a reason or None)
  #   5. if valid, also sets booking_reference
  #
  # The rest of the flow branches on validation_error to utter the
  # right response.
  #
  # Why only ONE flow?
  #   Earlier designs had `resume_from_loop` (programmatic re-entry)
  #   and `request_research` (bounces back to the loop). We removed
  #   both because:
  #   - `resume_from_loop`'s `collect:` steps would need user-facing
  #     utter_ask_* responses, which we don't have (and don't want —
  #     the homework triggers flows programmatically, never via
  #     user typing).
  #   - `request_research`'s reverse-handoff is better done at the
  #     HandoffBridge level in Python (Ex7), not inside Rasa. Keeping
  #     the reverse path out of Rasa also teaches students that the
  #     agent-bridge pattern spans process boundaries — it isn't a
  #     dialog concern.
  # ─────────────────────────────────────────────────────────────────
  confirm_booking:
    description: >
      Confirm a pub booking after validating party size and deposit.
      Triggers when the user sends the programmatic command
      /confirm_booking with booking metadata.
    steps:
      - id: validate
        action: action_validate_booking
        next:
          - if: "slots.validation_error is not null"
            then: rejected
          - else: confirmed
      - id: rejected
        action: utter_booking_rejected
        next: END
      - id: confirmed
        action: utter_booking_confirmed
        next: END

  resume_from_loop:
    description: >
      Re-enter booking validation after a loop-side handoff provided
      fresh booking data. Triggered by /resume_from_loop with booking
      metadata. Structurally identical to confirm_booking — the custom
      action does the heavy lifting.
    steps:
      - id: validate
        action: action_validate_booking
        next:
          - if: "slots.validation_error is not null"
            then: rejected
          - else: confirmed
      - id: rejected
        action: utter_booking_rejected
        next: END
      - id: confirmed
        action: utter_booking_confirmed
        next: END
